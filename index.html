<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page | Premium Access</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #050505;
            --card-bg: rgba(15, 15, 15, 0.95);
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(58, 123, 213, 0.05) 0%, transparent 40%);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 210, 255, 0.1);
            width: 360px;
            text-align: center;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--primary), transparent, var(--secondary));
            border-radius: 26px;
            z-index: -1;
            opacity: 0.3;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 30px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
            filter: brightness(1.1);
        }

        #info-box {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            animation: fadeIn 0.6s ease forwards;
        }

        .result-item {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .result-label {
            color: #777;
            font-size: 14px;
            display: block;
            margin-bottom: 2px;
        }

        .rank-badge {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(0, 210, 255, 0.15);
            color: var(--primary);
            border-radius: 50px;
            font-weight: bold;
            border: 1px solid var(--primary);
            margin-top: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1>Login Page</h1>
    
    <div class="input-group">
        <label>Roblox Isim</label>
        <input type="text" id="robloxUser" placeholder="Kullanıcı adını yaz...">
    </div>

    <div class="input-group">
        <label>Erişim Kodu</label>
        <input type="password" id="accessCode" placeholder="••••••">
    </div>

    <button onclick="checkAccess()">Sisteme Gir</button>

    <div id="info-box">
        <div class="result-item">
            <span class="result-label">Kod:</span>
            <span id="displayCode" style="font-weight: bold; color: #fff;"></span>
        </div>
        <div class="result-item" id="webKurucusuSection" style="display:none; color: #aaa; font-size: 14px; margin-bottom: 15px;">
            Web Kurucusu
        </div>
        <div class="rank-badge" id="displayRank"></div>
    </div>
</div>

<script>
    // Sistemdeki kayıtlı veriler - Hatalar düzeltildi
    const database = {
        "9240248": { user: "uxaklar", rank: "Kurucu", webKurucusu: true },
        "9349302": { user: "yagiz0038", rank: "Kurucu", webKurucusu: false },
        "yusuf312": { user: "YusufBenHesapBanYedi", rank: "Kurucu", webKurucusu: false }
    };

    function checkAccess() {
        const userInput = document.getElementById('robloxUser').value.trim();
        const codeInput = document.getElementById('accessCode').value.trim();
        const infoBox = document.getElementById('info-box');
        
        const data = database[codeInput];

        if (data && data.user.toLowerCase() === userInput.toLowerCase()) {
            infoBox.style.display = "block";
            document.getElementById('displayCode').innerText = codeInput;
            document.getElementById('displayRank').innerText = "Rütbe: " + data.rank;
            
            const webSection = document.getElementById('webKurucusuSection');
            webSection.style.display = data.webKurucusu ? "block" : "none";
            
            document.getElementById('accessCode').style.borderColor = "#2ed573";
        } else {
            alert("❌ Roblox ismi veya Kod yanlış!");
            infoBox.style.display = "none";
            document.getElementById('accessCode').style.borderColor = "#ff4757";
        }
    }
</script>

</body>
</html>
